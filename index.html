<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENTALTEK - Energía Aplicada a la Innovación</title>

    <!-- 🔹 Descripción principal -->
    <meta
      name="description"
      content="Desarrollamos soluciones tecnológicas que integran software, ciencia e ingeniería para potenciar empresas y transformar sistemas."
    />
    <meta name="author" content="Entaltek" />

    <!-- 🔹 Fuentes críticas -->
    <link rel="preload" href="/fonts/Sansation_Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Sansation_Bold.woff2" as="font" type="font/woff2" crossorigin />

    <!-- 🔹 Ícono y logotipo -->
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <meta property="og:image" content="https://entaltek.com/logo-icon.svg" />
    <meta name="twitter:image" content="https://entaltek.com/logo-icon.svg" />

    <!-- 🔹 Open Graph -->
    <meta property="og:title" content="ENTALTEK - Energía Aplicada a la Innovación" />
    <meta
      property="og:description"
      content="Desarrollamos soluciones tecnológicas que integran software, ciencia e ingeniería para potenciar empresas y transformar sistemas."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://entaltek.com" />

    <!-- 🔹 Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@entaltek" />

    <!-- 🔹 Datos estructurados de organización (para mostrar el logo oficial en Google) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Entaltek",
        "url": "https://entaltek.com",
        "logo": "https://entaltek.com/logo-icon.svg",
        "sameAs": [
          "https://www.linkedin.com/company/entaltek",
          "https://www.instagram.com/entaltek"
        ]
      }
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
